name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  actions: write

env:
  LLM_MODE: disabled
  ANONYMIZED_TELEMETRY: "False"
  CI: "true"
  RATE_LIMIT_ENABLED: "false"
  PYTHONHASHSEED: "0"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system OCR deps (Tesseract + poppler + ocrmypdf system)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-ron tesseract-ocr-eng poppler-utils \
            ghostscript qpdf

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary -r requirements-dev.txt

      - name: Prepare data dirs
        run: mkdir -p data/library data/vectorstore

      - name: Pytest
        run: pytest tests/ -q --tb=short
